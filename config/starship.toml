# ============================================================
# Starship Prompt Configuration
# ============================================================
# Design: Nord color scheme, powerline-style segments
#
# Left:  [ directory ] [ git-branch git-status ] [ ÔÄł k8s-context ]
# Right: [  python ] [  node ] [  go ] [  duration] [ HH:MM ]
#
# Modules auto-hide when not relevant (no k8s Ôćĺ no k8s segment, etc.)
# ============================================================

add_newline = true

# Left prompt: powerline dir Ôćĺ git Ôćĺ kubernetes Ôćĺ newline Ôćĺ status Ôćĺ character
format = """
$directory\
[ ](fg:#88C0D0 bg:#1d2230)\
$git_branch\
$git_status\
[ ](fg:#1d2230)\
$kubernetes\
\n$status$character"""

# Right prompt: language versions Ôćĺ duration Ôćĺ time
right_format = """
$python\
$nodejs\
$golang\
$terraform\
$cmd_duration\
$time"""

# ============================================================
# Directory
# ============================================================
[directory]
style = "fg:#2E3440 bg:#88C0D0 bold"
truncation_length = 4
truncate_to_repo = true
truncation_symbol = "ÔÇŽ/"
read_only = " ˇ░îż"
read_only_style = "fg:#f7768e"
format = "[ $path ]($style)[$read_only]($read_only_style)"

[directory.substitutions]
"Documents" = "ˇ░łÖ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

# ============================================================
# Git
# ============================================================
[git_branch]
symbol = " "
style = "bg:#1d2230"
format = '[[ $symbol$branch ](fg:#769ff0 bg:#1d2230)]($style)'

[git_status]
style = "bg:#1d2230"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#1d2230)]($style)'
conflicted = "ÔÜí"
ahead = "ÔČć${count}"
behind = "ÔČç${count}"
diverged = "ÔČć${ahead_count}ÔČç${behind_count}"
modified = "ÔťÄ"
staged = "Ôťö"
untracked = "?"
deleted = "Ôťś"

# ============================================================
# Kubernetes (shows only when a context is active)
# ============================================================
[kubernetes]
disabled = false
format = '[ÔÄł $context( \($namespace\)) ]($style)'

[[kubernetes.contexts]]
context_pattern = "rancher-desktop"
style = "bold green"
context_alias = "local"

[[kubernetes.contexts]]
context_pattern = "kind-.*"
style = "bold yellow"
context_alias = "kind"

[[kubernetes.contexts]]
context_pattern = "gke_.*"
style = "bold blue"
context_alias = "gke"

# ============================================================
# Exit Status (shows only on non-zero exit)
# ============================================================
[status]
disabled = false
symbol = "Ôťś "
style = "bold red"
format = "[$symbol]($style)"

# ============================================================
# Character (prompt indicator ÔÇö green on success, red on error)
# ============================================================
[character]
success_symbol = "[ÔŁ»](bold green)"
error_symbol = "[ÔŁ»](bold red)"
vimcmd_symbol = "[V](bold green)"

# ============================================================
# Language Versions (auto-detect per project directory)
# ============================================================
[python]
symbol = " "
style = "fg:#f7c948"
format = "[$symbol$version ]($style)"
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "setup.py", "Pipfile"]

[nodejs]
symbol = " "
style = "fg:#68a063"
format = "[$symbol$version ]($style)"
detect_files = ["package.json", ".node-version", ".nvmrc"]

[golang]
symbol = " "
style = "fg:#00ADD8"
format = "[$symbol$version ]($style)"
detect_files = ["go.mod", "go.sum"]

[terraform]
symbol = " "
style = "fg:#7b42bc"
format = "[$symbol$workspace ]($style)"

# ============================================================
# Command Duration (shows only when >= 2s)
# ============================================================
[cmd_duration]
min_time = 2000
style = "fg:#e0af68"
format = "[ $duration]($style) "

# ============================================================
# Time
# ============================================================
[time]
disabled = false
time_format = "%H:%M"
style = "fg:#a0a9cb"
format = "[ $time]($style)"

# ============================================================
# Disabled
# ============================================================
[aws]
disabled = true

[gcloud]
disabled = true

[username]
disabled = true
